<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <nav th:fragment="sidebar" class="sidebar">
        <div class="sidebar-header">
            <a href="/admin" class="sidebar-brand">
                <i class="fas fa-book-open me-2"></i>
                Admin Portal
            </a>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item">
                <a href="/admin/dashboard" class="nav-link" th:classappend="${page == 'dashboard'} ? 'active'">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
            </div>
            
            <!-- Quản lý sách -->
            <div class="nav-item">
                <a href="/admin/books" class="nav-link" th:classappend="${page == 'books'} ? 'active'">
                    <i class="fas fa-book"></i>
                    <span>Quản lý sách</span>
                </a>
            </div>
            
            <!-- Quản lý danh mục -->
            <div class="nav-item">
                <a href="/admin/categories" class="nav-link" th:classappend="${page == 'categories'} ? 'active'">
                    <i class="fas fa-tags"></i>
                    <span>Danh mục</span>
                </a>
            </div>
            
            <!-- Quản lý đơn hàng -->
            <div class="nav-item">
                <a href="/admin/orders" class="nav-link" th:classappend="${page == 'orders'} ? 'active'">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Đơn hàng</span>
                </a>
            </div>
            
            <!-- Quản lý người dùng -->
            <div class="nav-item">
                <a href="/admin/users" class="nav-link" th:classappend="${page == 'users'} ? 'active'">
                    <i class="fas fa-users"></i>
                    <span>Người dùng</span>
                </a>
            </div>
            
            <!-- Quản lý đánh giá -->
            <div class="nav-item">
                <a href="/admin/reviews" class="nav-link" th:classappend="${page == 'reviews'} ? 'active'">
                    <i class="fas fa-star"></i>
                    <span>Đánh giá</span>
                </a>
            </div>
            
            <!-- Quản lý mã giảm giá -->
            <div class="nav-item">
                <a href="/admin/coupons" class="nav-link" th:classappend="${page == 'coupons'} ? 'active'">
                    <i class="fas fa-ticket-alt"></i>
                    <span>Mã giảm giá</span>
                </a>
            </div>
            
            <!-- Báo cáo thống kê -->
            <div class="nav-item">
                <a href="/admin/reports" class="nav-link" th:classappend="${page == 'reports'} ? 'active'">
                    <i class="fas fa-chart-bar"></i>
                    <span>Báo cáo</span>
                </a>
            </div>
            
            <!-- Cài đặt hệ thống -->
            <div class="nav-item">
                <a href="/admin/settings" class="nav-link" th:classappend="${page == 'settings'} ? 'active'">
                    <i class="fas fa-cog"></i>
                    <span>Cài đặt</span>
                </a>
            </div>
        </div>
    </nav>
</body>
</html>
