<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý danh mục</title>
</head>
<body th:replace="~{page/admin/layout :: layout(~{::body}, 'Quản lý danh mục', 'categories')}">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Danh sách danh mục</h4>
        <a href="/admin/categories/create" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i>Thêm danh mục mới
        </a>
    </div>

    <!-- Alert Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Categories List -->
    <div class="row">
        <div th:each="category : ${categories}" class="col-md-6 mb-4">
            <div class="card h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <img th:if="${category.image}" th:src="${category.image}" 
                             class="me-3" style="width: 64px; height: 64px; object-fit: cover;">
                        <div>
                            <h5 class="card-title mb-1" th:text="${category.name}"></h5>
                            <p class="text-muted small mb-0" th:text="${category.description}"></p>
                        </div>
                    </div>

                    <!-- Subcategories -->
                    <div class="mt-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h6 class="mb-0">Danh mục con</h6>
                            <a th:href="@{/admin/categories/{id}/subcategories/create(id=${category.id})}" 
                               class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-plus"></i>
                            </a>
                        </div>
                        <div class="list-group">
                            <div th:each="subCategory : ${category.subCategories}" 
                                 class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                                <span th:text="${subCategory.name}"></span>
                                <div class="btn-group">
                                    <a th:href="@{/admin/categories/subcategories/edit/{id}(id=${subCategory.id})}" 
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <button type="button" class="btn btn-sm btn-outline-danger"
                                            th:onclick="'deleteSubCategory(' + ${subCategory.id} + ')'">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="btn-group w-100">
                        <a th:href="@{/admin/categories/edit/{id}(id=${category.id})}" 
                           class="btn btn-outline-primary">
                            <i class="fas fa-edit me-2"></i>Sửa
                        </a>
                        <button type="button" class="btn btn-outline-danger"
                                th:onclick="'deleteCategory(' + ${category.id} + ')'">
                            <i class="fas fa-trash me-2"></i>Xóa
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Category Modal -->
    <div class="modal fade" id="deleteCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Xác nhận xóa danh mục</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Bạn có chắc chắn muốn xóa danh mục này không? 
                    Tất cả danh mục con cũng sẽ bị xóa.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <form id="deleteCategoryForm" method="POST">
                        <button type="submit" class="btn btn-danger">Xóa</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function deleteCategory(id) {
            const modal = new bootstrap.Modal(document.getElementById('deleteCategoryModal'));
            const form = document.getElementById('deleteCategoryForm');
            form.action = `/admin/categories/delete/${id}`;
            modal.show();
        }

        function deleteSubCategory(id) {
            if (confirm('Bạn có chắc chắn muốn xóa danh mục con này?')) {
                fetch(`/admin/categories/subcategories/delete/${id}`, {
                    method: 'POST'
                }).then(() => {
                    window.location.reload();
                });
            }
        }
    </script>
</body>
</html>
