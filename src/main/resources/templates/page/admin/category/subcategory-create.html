<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm danh mục con</title>
</head>
<body th:replace="~{page/admin/layout :: layout(~{::body}, 'Thêm danh mục con', 'categories')}">
    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/categories/{categoryId}/subcategories/create(categoryId=${category.id})}" 
                  method="post">
                
                <div class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>
                    Thêm danh mục con cho <strong th:text="${category.name}"></strong>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tên danh mục con</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea class="form-control" name="description" rows="3"></textarea>
                </div>

                <div class="text-end mt-4">
                    <a href="/admin/categories" class="btn btn-secondary me-2">Hủy</a>
                    <button type="submit" class="btn btn-primary">Thêm danh mục con</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
