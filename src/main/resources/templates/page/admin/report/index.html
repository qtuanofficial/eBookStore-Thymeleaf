<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Báo cáo thống kê</title>
</head>
<body th:replace="~{page/admin/layout :: layout(~{::body}, 'Báo cáo thống kê', 'reports')}">
    <!-- Date Range Filter -->
    <div class="card mb-4">
        <div class="card-body">
            <form id="dateRangeForm" class="row align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Từ ngày</label>
                    <input type="date" class="form-control" name="startDate">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Đến ngày</label>
                    <input type="date" class="form-control" name="endDate">
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-filter me-2"></i>Lọc
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Revenue Stats -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="card-title mb-0">Thống kê doanh thu</h5>
        </div>
        <div class="card-body">
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="small-stat-card bg-primary text-white">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6 class="text-uppercase mb-1">Tổng doanh thu</h6>
                                <h3 class="mb-0" th:text="${#numbers.formatDecimal(revenueStats.total, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">0 VNĐ</h3>
                            </div>
                            <div class="stat-icon">
                                <i class="fas fa-money-bill-wave fa-3x"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-4">
                    <div class="small-stat-card bg-success text-white">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6 class="text-uppercase mb-1">Số đơn thành công</h6>
                                <h3 class="mb-0" th:text="${revenueStats.successOrders}">0</h3>
                            </div>
                            <div class="stat-icon">
                                <i class="fas fa-shopping-cart fa-3x"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-4">
                    <div class="small-stat-card bg-info text-white">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6 class="text-uppercase mb-1">Trung bình/đơn</h6>
                                <h3 class="mb-0" th:text="${#numbers.formatDecimal(revenueStats.avgOrderValue, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">0 VNĐ</h3>
                            </div>
                            <div class="stat-icon">
                                <i class="fas fa-chart-line fa-3x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Revenue Chart -->
            <div class="mt-4">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Product Stats -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="card-title mb-0">Thống kê sản phẩm</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <!-- Top Selling Products -->
                    <h6 class="mb-3">Sách bán chạy</h6>
                    <div class="table-responsive">
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Sách</th>
                                    <th class="text-end">Số lượng</th>
                                    <th class="text-end">Doanh thu</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="product : ${productStats.topSelling}">
                                    <td>
                                        <div th:text="${product.title}"></div>
                                        <small class="text-muted" th:text="${product.author}"></small>
                                    </td>
                                    <td class="text-end" th:text="${product.quantity}"></td>
                                    <td class="text-end" th:text="${#numbers.formatDecimal(product.revenue, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <!-- Category Distribution -->
                    <h6 class="mb-3">Phân bố theo danh mục</h6>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Stats -->
    <div class="card">
        <div class="card-header">
            <h5 class="card-title mb-0">Thống kê đơn hàng</h5>
        </div>
        <div class="card-body">
            <div class="row g-4">
                <div class="col-md-6">
                    <!-- Order Status Distribution -->
                    <canvas id="orderStatusChart"></canvas>
                </div>
                
                <div class="col-md-6">
                    <!-- Payment Method Distribution -->
                    <canvas id="paymentMethodChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // Revenue Chart
        const revenueData = /*[[${revenueStats.chartData}]]*/ [];
        new Chart(document.getElementById('revenueChart'), {
            type: 'line',
            data: {
                labels: revenueData.map(d => d.date),
                datasets: [{
                    label: 'Doanh thu',
                    data: revenueData.map(d => d.amount),
                    borderColor: '#3b82f6',
                    tension: 0.1
                }]
            }
        });

        // Category Distribution Chart
        const categoryData = /*[[${productStats.categoryData}]]*/ [];
        new Chart(document.getElementById('categoryChart'), {
            type: 'pie',
            data: {
                labels: categoryData.map(d => d.name),
                datasets: [{
                    data: categoryData.map(d => d.count),
                    backgroundColor: [
                        '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6'
                    ]
                }]
            }
        });

        // Order Status Chart
        const orderStatusData = /*[[${orderStats.statusData}]]*/ [];
        new Chart(document.getElementById('orderStatusChart'), {
            type: 'doughnut',
            data: {
                labels: orderStatusData.map(d => d.status),
                datasets: [{
                    data: orderStatusData.map(d => d.count),
                    backgroundColor: [
                        '#f59e0b', // Pending
                        '#3b82f6', // Processing
                        '#10b981', // Completed
                        '#ef4444'  // Cancelled
                    ]
                }]
            }
        });

        // Payment Method Chart
        const paymentData = /*[[${orderStats.paymentData}]]*/ [];
        new Chart(document.getElementById('paymentMethodChart'), {
            type: 'bar',
            data: {
                labels: paymentData.map(d => d.method),
                datasets: [{
                    label: 'Số lượng đơn hàng',
                    data: paymentData.map(d => d.count),
                    backgroundColor: '#3b82f6'
                }]
            }
        });

        // Date Range Filter
        document.getElementById('dateRangeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // TODO: Implement date range filtering
        });
    </script>
</body>
</html>
