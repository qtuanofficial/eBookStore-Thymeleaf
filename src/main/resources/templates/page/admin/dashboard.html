<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css"> <!-- Thêm css tùy chỉnh nếu cần -->
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-card">
        <h3>Total Books</h3>
        <p th:text="${totalBooks}"></p>
    </div>

    <div class="dashboard-card">
        <h3>Total Orders</h3>
        <p th:text="${totalOrders}"></p>
    </div>

    <div class="dashboard-card">
        <h3>Total Users</h3>
        <p th:text="${totalUsers}"></p>
    </div>

    <div class="dashboard-card">
        <h3>Total Categories</h3>
        <p th:text="${totalCategories}"></p>
    </div>

    <div class="dashboard-card">
        <h3>Total Sub-Categories</h3>
        <p th:text="${totalSubCategories}"></p>
    </div>

    <div class="dashboard-card">
        <h3>Recent Orders (Last 30 Days)</h3>
        <p th:text="${recentOrders}"></p>
    </div>

    <div class="dashboard-card">
        <h3>Recent Users (Last 30 Days)</h3>
        <p th:text="${recentUsers}"></p>
    </div>
</div>
</body>
</html>
