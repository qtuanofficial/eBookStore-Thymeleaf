<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng</title>
</head>
<body th:replace="~{page/admin/layout :: layout(~{::body}, 'Quản lý người dùng', 'users')}">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Danh sách người dùng</h4>
        <a href="/admin/users/create" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i>Thêm người dùng mới
        </a>
    </div>

    <!-- Alert Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Users Table -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Avatar</th>
                            <th>Thông tin</th>
                            <th>Email</th>
                            <th>Ngày tạo</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}" th:unless="${user.deletedAt != null}">
                            <td th:text="${user.id}"></td>
                            <td>
                                <img th:src="${user.avatar != null ? user.avatar : '/image/default-avatar.png'}" 
                                     alt="Avatar" class="rounded-circle"
                                     style="width: 40px; height: 40px; object-fit: cover;">
                            </td>
                            <td>
                                <div th:text="${user.firstName + ' ' + user.lastName}"></div>
                                <small class="text-muted" th:text="${user.username}"></small>
                            </td>
                            <td th:text="${user.email}"></td>
                            <td th:text="${#dates.format(user.createdAt, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span class="badge" th:classappend="${user.isActive ? 'bg-success' : 'bg-danger'}"
                                      th:text="${user.isActive ? 'Đang hoạt động' : 'Vô hiệu hóa'}">
                                </span>
                            </td>
                            <td>
                                <div class="btn-group">
                                    <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" 
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <button type="button" 
                                            class="btn btn-sm btn-outline-warning"
                                            th:onclick="'toggleStatus(' + ${user.id} + ')'">
                                        <i class="fas fa-power-off"></i>
                                    </button>
                                    <button type="button" 
                                            class="btn btn-sm btn-outline-danger"
                                            th:onclick="'deleteUser(' + ${user.id} + ')'">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Xác nhận xóa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Bạn có chắc chắn muốn xóa người dùng này không?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <form id="deleteForm" method="POST">
                        <button type="submit" class="btn btn-danger">Xóa</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function deleteUser(id) {
            const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
            const form = document.getElementById('deleteForm');
            form.action = `/admin/users/delete/${id}`;
            modal.show();
        }

        function toggleStatus(id) {
            if (confirm('Bạn có chắc chắn muốn thay đổi trạng thái của người dùng này?')) {
                fetch(`/admin/users/${id}/toggle-status`, {
                    method: 'POST'
                }).then(() => {
                    window.location.reload();
                });
            }
        }
    </script>
</body>
</html>
