<div th:fragment="content">
    <h1 class="mb-4">Books</h1>
    <a href="/admin/books/new" class="btn btn-primary mb-3">Add New Book</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.category.name}"></td>
            <td th:text="${#numbers.formatCurrency(book.price)}"></td>
            <td th:text="${book.stock}"></td>
            <td>
                <a th:href="@{/admin/books/edit/{id}(id=${book.id})}" class="btn btn-sm btn-primary">Edit</a>
                <a th:href="@{/admin/books/delete/{id}(id=${book.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this book?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
