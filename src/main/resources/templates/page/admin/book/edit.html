<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa sách</title>
</head>
<body th:replace="~{page/admin/layout :: layout(~{::body}, 'Chỉnh sửa sách', 'books')}">
    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/books/edit/{id}(id=${book.id})}" method="post" 
                  enctype="multipart/form-data" th:object="${book}">
                <div class="row">
                    <!-- Thông tin cơ bản -->
                    <div class="col-md-8">
                        <h5 class="card-title mb-4">Thông tin sách</h5>
                        
                        <div class="mb-3">
                            <label class="form-label">Tiêu đề</label>
                            <input type="text" class="form-control" name="title" 
                                   th:value="*{title}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Tác giả</label>
                            <input type="text" class="form-control" name="author" 
                                   th:value="*{author}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Danh mục</label>
                            <select class="form-select" name="subCategoryId" required>
                                <option value="">Chọn danh mục</option>
                                <optgroup th:each="category : ${categories}" 
                                          th:label="${category.name}">
                                    <option th:each="subCategory : ${category.subCategories}"
                                            th:value="${subCategory.id}"
                                            th:text="${subCategory.name}"
                                            th:selected="${book.subCategory != null && book.subCategory.id == subCategory.id}">
                                    </option>
                                </optgroup>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giá (VNĐ)</label>
                            <input type="number" class="form-control" name="price" 
                                   th:value="*{price}" required min="0">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">ISBN</label>
                            <input type="text" class="form-control" name="isbn" 
                                   th:value="*{bookDetail?.isbn}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nhà xuất bản</label>
                            <input type="text" class="form-control" name="publisher" 
                                   th:value="*{bookDetail?.publisher}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ngày xuất bản</label>
                            <input type="date" class="form-control" name="publicationDate" 
                                   th:value="*{bookDetail?.publicationDate}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số trang</label>
                            <input type="number" class="form-control" name="pages" 
                                   th:value="*{bookDetail?.pages}" min="1">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả ngắn</label>
                            <textarea class="form-control" name="description" rows="3" 
                                      th:text="*{bookDetail?.description}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nội dung chi tiết</label>
                            <textarea class="form-control" name="summary" rows="5" 
                                      th:text="*{bookDetail?.summary}"></textarea>
                        </div>
                    </div>

                    <!-- Upload ảnh -->
                    <div class="col-md-4">
                        <h5 class="card-title mb-4">Ảnh bìa sách</h5>
                        
                        <div class="mb-3">
                            <div class="d-flex flex-column align-items-center">
                                <img id="coverPreview" th:src="${book.cover}" 
                                     alt="Book Cover Preview" 
                                     class="img-thumbnail mb-2" 
                                     style="width: 200px; height: 280px; object-fit: cover;">
                                
                                <div class="d-flex gap-2">
                                    <label class="btn btn-outline-primary">
                                        <i class="fas fa-upload me-2"></i>Upload
                                        <input type="file" name="coverFile" id="coverFile" 
                                               accept="image/*" style="display: none"
                                               onchange="previewImage(this);">
                                    </label>
                                    <button type="button" class="btn btn-outline-danger"
                                            onclick="resetImage()">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <h5 class="card-title mb-4 mt-4">File sách điện tử</h5>
                        <div class="mb-3">
                            <div class="d-flex gap-2 align-items-center">
                                <input type="file" name="bookFile" id="bookFile" 
                                       accept=".pdf,.epub" style="display: none"
                                       onchange="updateFileLabel(this);">
                                <label class="btn btn-outline-primary" for="bookFile">
                                    <i class="fas fa-file-upload me-2"></i>Upload
                                </label>
                                <span id="fileLabel" th:text="${book.bookDetail?.fileUrl != null ? book.bookDetail.fileUrl : 'Chưa chọn file'}">
                                    Chưa chọn file
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-end mt-4">
                    <a href="/admin/books" class="btn btn-secondary me-2">Hủy</a>
                    <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('coverPreview').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function resetImage() {
            document.getElementById('coverPreview').src = '/image/default-book-cover.png';
            document.getElementById('coverFile').value = '';
        }

        function updateFileLabel(input) {
            const label = document.getElementById('fileLabel');
            label.textContent = input.files[0] ? input.files[0].name : 'Chưa chọn file';
        }

        // Kích hoạt CKEditor cho các textarea
        ClassicEditor
            .create(document.querySelector('textarea[name="description"]'))
            .catch(error => console.error(error));

        ClassicEditor
            .create(document.querySelector('textarea[name="summary"]'))
            .catch(error => console.error(error));
    </script>
</body>
</html>
